# =============================================================================
# Samurai Robot — Centralized Configuration
# =============================================================================
# All tunable constants in one place. Files that previously hardcoded these
# values now read from here via config_loader.py.

network:
  # Timeout (seconds) for local IP auto-detection socket call.
  # Prevents indefinite hang when network is unavailable at startup.
  ip_detection_timeout: 2.0
  dashboard_port: 5000
  mqtt_port: 1883
  mqtt_robot_id: robot1
  ros_domain_id: 42

voice:
  # Path to Vosk speech recognition model.
  # Use ~ for home directory — expanded at runtime via os.path.expanduser.
  # Override via ROS2 parameter: --ros-args -p model_path:=/custom/path
  model_path: ~/vosk-model-ru
  sample_rate: 16000
  chunk_size: 4000          # samples per read (250 ms)
  vad_frame_bytes: 960      # 30 ms frame at 16 kHz int16
  vad_aggressiveness: 2     # 0=lenient, 3=strict

  # Input validation
  max_command_length: 200   # discard unreasonably long voice strings

dashboard:
  state_push_hz: 10         # WebSocket state broadcast frequency (was 4)
  mjpeg_fps: 30             # MJPEG video stream max FPS
  voice_log_size: 20        # entries kept in voice log deque
  event_log_size: 100       # entries kept in event log deque

simulator:
  # Arena dimensions (metres)
  arena_width: 3.0
  arena_height: 3.0

  # Robot physical parameters
  robot_radius: 0.12
  wheel_base: 0.17
  max_linear: 0.3           # m/s
  max_angular: 2.0          # rad/s

  # Ball parameters
  ball_radius: 0.02
  ball_diameter: 0.04

  # Camera
  cam_width: 640
  cam_height: 480
  focal_length_px: 500.0
  cam_fov_deg: 60.0

  # Ultrasonic sensor
  ultrasonic_max: 2.0
  ultrasonic_min: 0.02
  ultrasonic_fov: 0.26      # ~15° half-cone (radians)

  # Simulation loop
  sim_hz: 20                # physics update frequency
  grid_resolution: 0.05     # A* pathfinding cell size (metres)
  safety_margin: 0.10       # obstacle clearance (metres)
  jpeg_quality: 75          # JPEG compression quality (0-100)
  emit_state_hz: 4          # SocketIO state emit frequency

# IMU filtering (Extended Kalman Filter on Pi)
imu:
  # Startup calibration: robot MUST be stationary during first ~2 seconds
  calibration_samples: 100   # 100 @ 50Hz = 2 sec

  ekf:
    enabled: true
    # Process noise (больше = меньше доверия гироскопу, больше следования акселерометру)
    q_angle: 0.001         # rad² — шум углов
    q_bias: 0.0001         # (rad/s)² — случайное блуждание bias гироскопа
    # Measurement noise (больше = меньше доверия акселерометру)
    r_accel: 0.5           # (m/s²)² — шум акселерометра
    # Accel gate: пропуск update если |‖a‖ − g| > gate·g
    # Для гусеничного робота с вибрациями — увеличен до 0.3 (30%)
    accel_gate: 0.3        # доля g — строже фильтрует вибрации при движении

# Odometry dead zones (anti-vibration)
odometry:
  deadzone_linear: 0.01    # m/s — ниже = стоим
  deadzone_angular: 0.05   # rad/s — ниже = не вращаемся
  cmd_vel_timeout: 0.5     # sec — auto-stop без новых команд (быстрая остановка при потере связи)

# Accelerometer position estimator
accel_position:
  latitude: 55.75            # широта для компенсации вращения Земли (Москва)
  complementary_alpha: 0.98  # fallback: 98% колёсная, 2% акселерометр
  accel_noise_threshold: 0.12  # m/s² — ниже = шум (снижено с 0.15 для лучшей чувствительности)
  median_window: 5             # сэмплов для медианного фильтра (spike rejection)
  lpf_alpha: 0.4               # IIR low-pass alpha (0.4 при 50Hz → ~2.2Hz cutoff, убирает вибрации)
  # ZUPT с гистерезисом — два порога: вход в стоянку (мягкий) и выход (жёсткий)
  zupt_gyro_enter: 0.015     # rad/s — ниже = входим в стоянку
  zupt_accel_enter: 0.10     # m/s² — ниже = входим в стоянку
  zupt_gyro_exit: 0.04       # rad/s — выше = выходим из стоянки
  zupt_accel_exit: 0.25      # m/s² — выше = выходим из стоянки
  zupt_enter_count: 5        # сэмплов (100мс @ 50Hz)
  zupt_exit_count: 3         # сэмплов (60мс @ 50Hz)
  velocity_decay: 0.95       # fallback: затухание скорости (без EKF)
  lateral_decay: 0.5         # fallback: non-holonomic constraint

# Velocity EKF — фильтр Калмана для фузии одометрии + акселерометра
# ВАЖНО: одометрия основана ИСКЛЮЧИТЕЛЬНО на IMU (акселерометр + гироскоп).
# Моторные команды НЕ влияют на оценку позиции — если гусеницы крутятся
# а робот стоит на месте (поднят), позиция НЕ меняется.
#
# friction_tau = как быстро скорость затухает без ускорения (трение гусениц)
# Больше q_velocity = больше неопределённости в prediction (friction model rough)
# Меньше r_accel = больше доверия акселерометру (единственный источник движения)
velocity_ekf:
  friction_tau: 0.15           # постоянная трения (с) — как быстро скорость затухает
                               # 0.1-0.3 для гусеничных платформ (высокое трение гусениц)
  q_velocity: 0.20             # (m/s)²/s — шум процесса скорости (неопределённость friction model)
  q_bias: 0.003                # (m/s)²/s — шум блуждания bias акселерометра (медленный дрифт)
  r_accel: 0.06                # (m/s)² — шум измерения скорости из акселерометра
                               # (единственный источник реального движения)
  r_zupt: 0.0001               # (m/s)² — шум ZUPT (очень маленький: стоим = v=0)
  lateral_decay: 0.15           # затухание боковой скорости (гусеницы не едут вбок)

# Servo configuration (PCA9685 channels)
# ch0 = основание клешни, ch1 = сустав 1, ch2 = сустав 2, ch3 = клешня, ch4 = голова
servos:
  head:
    channel: 4            # один серво — камера
    home: 90              # центр (смотрит вперёд)
    min: 0                # крайнее правое положение
    max: 180              # крайнее левое положение
    speed: 2.0            # градусов за тик (плавное движение)
    locked: true          # при запуске голова НЕ двигается (остаётся как есть)
                          # разблокировать: head/command → "unlock" или {"command":"unlock"}
  arm:
    channels: [0, 1, 2, 3]   # PCA9685 каналы суставов руки
    # CH0=основание, CH1=сустав1, CH2=сустав2, CH3=клешня
    home_angles: [0, 120, 0, 0]
    min_angles:  [0, 0, 0, 0]
    max_angles:  [120, 145, 180, 180]
    labels: ["Основание", "Сустав 1", "Сустав 2", "Клешня"]
    locked: true          # при запуске рука НЕ двигается (остаётся как есть)
                          # разблокировать: arm/command → "unlock" или {"command":"unlock"}

# Path recorder (запись пути для возврата домой)
path_recorder:
  record_interval_m: 0.025     # записывать точку каждые 2.5 см (точнее)
  record_interval_rad: 0.06    # или каждые ~3.4° поворота
  replay_goal_tolerance: 0.035 # м — точность промежуточных точек
  replay_home_tolerance: 0.012 # м — точность финальной точки (1.2 см)
  replay_linear_speed: 0.18    # м/с — скорость возврата (медленнее для точности)
  replay_min_linear: 0.04      # м/с — минимальная скорость (антистолл)
  replay_angular_speed: 0.8    # рад/с — макс скорость поворота
  replay_angular_kp: 2.8       # P-коэффициент угловой коррекции (усилен)
  replay_lookahead_m: 0.08     # м — дистанция опережения (точнее)
  max_waypoints: 10000         # лимит точек
  final_home_align: true       # выравнивание курса после возврата домой
  obstacle_stop_dist: 0.18     # м — остановка при препятствии
  obstacle_slow_dist: 0.35     # м — замедление при препятствии

# Точное движение с коррекцией (precision_drive_node)
# Профиль скорости совпадает с tests/test_precision_drive.py:
#   CRUISE_SPEED_PCT=50%, MIN_SPEED_PCT=18%, MAX_SPEED_M_S=0.30
precision_drive:
  drive_speed: 0.15              # м/с — крейсерская скорость (50% × 0.30)
  drive_speed_min: 0.054         # м/с — минимальная скорость (18% × 0.30)
  accel_distance_m: 0.06         # м — зона разгона (6 см)
  slow_distance_m: 0.10          # м — зона торможения (10 см)
  arrive_tolerance_m: 0.005      # м — допуск прибытия (5 мм)
  overshoot_tolerance_m: 0.010   # м — допустимый перелёт (10 мм)

  turn_speed: 0.5                # рад/с — скорость поворота
  turn_speed_slow: 0.15          # рад/с — минимальная скорость поворота
  turn_slow_rad: 0.15            # рад — зона замедления поворота
  turn_tolerance_rad: 0.02       # рад — допуск поворота (~1.1°, было 1.7°)

  heading_kp: 2.5                # P-коэфф коррекции курса (увеличен)
  heading_ki: 0.3                # I-коэфф — устраняет постоянную ошибку курса
  heading_max_correction: 0.4    # рад/с — макс угловая коррекция курса
  lateral_kp: 2.0                # P-коэфф коррекции бокового смещения (увеличен)
  lateral_max_correction: 0.3    # рад/с — макс коррекция бокового дрейфа

  # Обнаружение возмущений
  push_accel_threshold: 3.0      # м/с² — порог бокового ускорения (толчок)
  push_cooldown_s: 1.0           # с — кулдаун между детекциями толчка
  lift_gravity_low: 6.0          # м/с² — ниже = робот в воздухе (<0.6g)
  lift_gravity_ok: 8.5           # м/с² — выше = робот на земле (>0.87g)
  lift_samples: 5                # подряд сэмплов для детекции подъёма
  settle_time_s: 0.3             # с — пауза после возмущения (было 0.5)
  scenario_settle_s: 0.25        # с — пауза после остановки (= BRAKE_SETTLE_S в тесте)

  timeout_per_cm_s: 0.5          # с/см — таймаут на 1 см пути
  max_leg_timeout_s: 30.0        # с — макс таймаут одного отрезка

# Калибровка колёсной одометрии
# Получено через tests/test_precision_drive.py (режим c)
# Профили хранятся в calibration_profiles.yaml (зависят от поверхности/места)
# Активный профиль загружается motor_node при старте
wheel_calibration:
  scale_linear_fwd: 1.235      # вперёд: реальное / одометрическое (робот едет дальше нормы)
  scale_linear_bwd: 0.988      # назад:  FWD × 0.80 (мотор менее эффективен назад)
  motor_trim_pct:  -12.003     # угловая поправка % (правый мотор слабее: даём ему +12%)
  scale_angular: 1.0           # угловой масштаб (не калиброван)

# SLAM карта (ультразвук + одометрия)
slam_map:
  map_size_m: 10.0             # карта ±5м от начала (10×10м)
  cell_size_m: 0.05            # 5 см/ячейка → 200×200 сетка
  publish_interval_s: 2.0      # публикация карты (0.5 Гц)
  sensor_fov_rad: 0.26         # ~15° полуконус HC-SR04
  sensor_max_range: 2.0        # м
  l_occ: 0.85                  # log-odds прирост для занятой ячейки
  l_free: -0.40                # log-odds прирост для свободной ячейки

# Детектор объектов (compute_node/object_detector_node.py, запуск на ноутбуке)
object_detector:
  # Параметры камеры (должны совпадать с camera_node)
  cam_width:        640
  cam_height:       480
  focal_length_px:  500.0       # пиксели — уточни через калибровку камеры
  cam_fov_deg:      60.0        # горизонтальный FOV камеры (градусы)

  # Детекция
  confidence:       0.40        # порог уверенности YOLO / HSV blob
  yolo_model:       yolov11n.pt  # имя файла модели (ищется в текущей папке и ~/models/)

  # Оценка дистанции
  ultrasonic_center_thr: 0.25   # |cx_norm| < порог → объект по центру
  ultrasonic_weight:     0.65   # доля ультразвука при смешивании методов
  ultrasonic_max_age_s:  0.5    # с — макс возраст показания УЗ

  # Объекты для монокулярной глубины (реальная высота в м)
  object_sizes:
    sports ball: 0.04
    ball:        0.04
    bottle:      0.25
    cup:         0.12
    person:      1.70
    chair:       0.90
    cat:         0.30
    dog:         0.40
    car:         1.50
    default:     0.10

  # Публикация аннотированного кадра (увеличивает трафик)
  publish_annotated: true
  annotated_jpeg_quality: 70

# Реестр объектов в SLAM карте (pi_nodes/nodes/slam_map_node.py)
object_registry:
  cluster_radius_m: 0.30   # м — два наблюдения ближе = один объект
  max_age_s:        120.0  # с — объект удаляется если не виден N секунд
  min_conf:         0.35   # минимальная уверенность для регистрации

# HSV colour ranges for ball/object classification (YoloDetectorNode)
# Each colour has a list of [H_low, S_low, V_low, H_high, S_high, V_high] ranges
hsv_colours:
  red:    [[0,70,70, 10,255,255], [160,70,70, 180,255,255]]
  orange: [[10,80,80, 25,255,255]]
  yellow: [[22,80,80, 38,255,255]]
  green:  [[35,60,60, 85,255,255]]
  blue:   [[85,60,60, 135,255,255]]
  white:  [[0,0,180, 180,40,255]]
  black:  [[0,0,0, 180,255,60]]

# GPU laptop (remote YOLO detection via MQTT)
# GPU-ноутбук подключается к тому же MQTT-брокеру на Pi.
# Не требует ROS2/Docker — только Python + ultralytics + paho-mqtt.
gpu_detector:
  enabled: false              # true = YOLO на отдельном GPU-ноутбуке
  device: cuda                # cuda или cpu
  model: yolo11n.pt           # модель YOLO (.pt → автоконверт в .onnx)
  confidence: 0.40            # порог уверенности
  publish_annotated: true     # публиковать аннотированные кадры
  annotated_quality: 70       # JPEG качество аннотации

# Watchdog
watchdog:
  startup_grace_sec: 15.0  # seconds before emergency stop logic activates (camera boot ~10s)
  topic_timeout_sec: 3.0   # topic considered dead after this many seconds
  report_interval: 0.5     # health report publish rate (seconds)

# MQTT settings for pi_nodes (pure Python, no ROS2)
mqtt:
  broker: "127.0.0.1"          # Mosquitto on Pi (override via --broker)
  port: 1883
  robot_id: "robot1"
  camera_fps: 20               # MQTT camera framerate (was 12, увеличено для отзывчивости)
  camera_jpeg_quality: 70      # повышено с 60 для лучшего качества детекции
  keepalive: 15                # MQTT keepalive (sec) — быстрое обнаружение потери связи
  reconnect_min: 0.5           # MQTT reconnect min delay (sec)
  reconnect_max: 5             # MQTT reconnect max delay (sec)
